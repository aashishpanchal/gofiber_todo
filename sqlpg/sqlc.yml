version: "2"
# Postgresql Config
sql:
  - engine: "postgresql"
    queries: "./query/*.sql"
    schema: "./schema/*.sql"
    gen:
      go:
        package: "repos"
        out: "../src/db/repos"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
